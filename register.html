<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход и Регистрация | ShinAR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles/register.css">
</head>
<body>

    <section class="auth-section">
        <div class="auth-container">
            
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Войти</button>
                <button class="tab-btn" onclick="switchTab('register')">Регистрация</button>
            </div>

            <div class="auth-box">
                <a href="index.html" class="auth-close-btn">&times;</a>

                <form id="shinar-login-form" class="auth-form active">
                    <h3>Вход в кабинет</h3>
                    
                    <div class="input-group">
                        <label for="login-email">Электронная почта</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="login-email" placeholder="name@example.com" required autocomplete="off">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="login-pass">Пароль</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="login-pass" placeholder="Введите ваш пароль" required>
                        </div>
                    </div>

                    <button type="submit" class="auth-btn">Войти</button>
                </form>

                <form id="shinar-reg-form" class="auth-form">
                    <h3>Регистрация</h3>
                    
                    <div class="input-group">
                        <label for="reg-name">Имя</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" id="reg-name" placeholder="Алексей" required autocomplete="off">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="reg-phone">Телефон</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-phone"></i>
                            <input type="tel" id="reg-phone" placeholder="+374 XX XX-XX-XX" required autocomplete="off">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="reg-email">Электронная почта</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="reg-email" placeholder="name@example.com" required autocomplete="off">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="reg-pass">Пароль</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="reg-pass" placeholder="Придумайте пароль" required>
                        </div>
                    </div>

                    <button type="submit" class="auth-btn">Создать аккаунт</button>
                </form>
            </div>

        </div>
    </section>

    <script src="/js/register.js"></script>
</body>
</html>
